name: Build & Push

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/simple-ai-macro-tracker:latest
                  build-args: |
                      SHTAI_API_URL=${{ secrets.SHTAI_API_URL }}

            - name: Notify NAS to deploy
              env:
                  WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
              run: |
                  PAYLOAD='{"ref":"refs/heads/main","repository":{"name":"simple-ai-macro-tracker"}}'
                  SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
                  curl -sf -X POST https://webhook.deadstockjosh.com \
                    -H "Content-Type: application/json" \
                    -H "x-hub-signature-256: $SIG" \
                    -d "$PAYLOAD"
